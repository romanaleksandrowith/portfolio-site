    h1, h2, h3 {

		project6LinkText: "View project on GitHub",
		project6Link: "https://github.com/romanaleksandrowith/fhir-patient-dashboard",

        work: [
          "Understand your task",

        ],

      ru: {

    function renderList(elementId, items) {
      const el = document.getElementById(elementId);
      el.innerHTML = "";
      items.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        el.appendChild(li);
      });
    }

    function setLanguage(lang) {
      const t = content[lang];

      document.documentElement.lang = lang;
      document.title = t.pageTitle;

		document.getElementById("hero-title").textContent = t.heroTitle;
		document.getElementById("hero-text").textContent = t.heroText;

		document.getElementById("services-title").textContent = t.servicesTitle;
		renderList("services-list", t.services);

		document.getElementById("portfolio-title").textContent = t.portfolioTitle;

		document.getElementById("project1-title").textContent = t.project1Title;
		document.getElementById("project1-text").textContent = t.project1Text;

		document.getElementById("project2-title").textContent = t.project2Title;
		document.getElementById("project2-text").textContent = t.project2Text;

		document.getElementById("project3-title").textContent = t.project3Title;
		document.getElementById("project3-text").textContent = t.project3Text;

		document.getElementById("project4-title").textContent = t.project4Title;
		document.getElementById("project4-text").textContent = t.project4Text;
	
		document.getElementById("project5-title").textContent = t.project5Title;
		document.getElementById("project5-text").textContent = t.project5Text;
		document.getElementById("project5-link").textContent = t.project5LinkText;
		document.getElementById("project5-link").href = t.project5Link;
		
		document.getElementById("project6-title").textContent = t.project6Title;
		document.getElementById("project6-text").textContent = t.project6Text;
		document.getElementById("project6-link").textContent = t.project6LinkText;
		document.getElementById("project6-link").href = t.project6Link;

		document.getElementById("work-title").textContent = t.workTitle;
		renderList("work-list", t.work);

		document.getElementById("tools-title").textContent = t.toolsTitle;
		document.getElementById("tools-text").textContent = t.toolsText;

		document.getElementById("contact-title").textContent = t.contactTitle;
		document.getElementById("contact-text").textContent = t.contactText;

      localStorage.setItem("siteLanguage", lang);
    }

    const savedLanguage = localStorage.getItem("siteLanguage") || "en";
    setLanguage(savedLanguage);
  </script>

  
  
</body>
</html>
